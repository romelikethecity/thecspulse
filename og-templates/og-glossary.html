<!DOCTYPE html>
<!--
  The CS Pulse — OG Glossary Template
  Render at 1200x630 pixels. Glossary term pages.
  Placeholders: {{TITLE}}, {{SUBTITLE}}
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Source+Code+Pro:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }
  .og-card {
    width: 1200px;
    height: 630px;
    background: #111111;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 56px 64px;
  }
  .og-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
  .og-card::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 500px;
    height: 300px;
    background: radial-gradient(ellipse at bottom right, rgba(5,150,105,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-text {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: #F0F0F0;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: #059669; }
  .domain {
    font-family: 'Source Code Pro', monospace;
    font-size: 14px;
    color: #6B6B6B;
    letter-spacing: 1px;
  }
  .content {
    position: relative;
    z-index: 1;
  }
  .category-label {
    font-family: 'Source Code Pro', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #34D399;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .title {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 44px;
    color: #FFFFFF;
    line-height: 1.2;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
    max-width: 800px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .subtitle {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: #9B9B9B;
    max-width: 640px;
    line-height: 1.5;
    margin-bottom: 24px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .accent-bar {
    width: 80px;
    height: 4px;
    background: #059669;
    border-radius: 2px;
  }
  /* Decorative quotation mark */
  .quote-deco {
    position: absolute;
    top: 100px;
    right: 80px;
    font-family: 'DM Sans', sans-serif;
    font-size: 200px;
    font-weight: 700;
    color: #059669;
    opacity: 0.06;
    line-height: 1;
    pointer-events: none;
    z-index: 0;
  }
  .deco-wave {
    position: absolute;
    right: 64px;
    bottom: 80px;
    opacity: 0.15;
  }
</style>
</head>
<body>
  <div class="og-card">
    <div class="top-bar">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 36 36">
          <rect width="36" height="36" rx="8" fill="#059669"/>
          <polyline points="5,22 10,22 14,14 18,28 22,10 26,22 31,22" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="logo-text">The CS <span>Pulse</span></div>
      </div>
      <div class="domain">THECSPULSE.COM</div>
    </div>
    <div class="content">
      <div class="category-label">CS GLOSSARY</div>
      <div class="title">{{TITLE}}</div>
      <div class="subtitle">{{SUBTITLE}}</div>
      <div class="accent-bar"></div>
    </div>
    <div class="quote-deco">&ldquo;</div>
    <svg class="deco-wave" width="200" height="60" viewBox="0 0 200 60">
      <polyline points="0,40 30,40 50,15 70,50 90,10 110,45 140,20 170,35 200,30" fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</body>
</html>
