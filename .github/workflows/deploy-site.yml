name: Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build site
        run: python3 scripts/build.py --skip-og

      - name: Validate output
        run: |
          test -f output/index.html || (echo "Missing index.html" && exit 1)
          test -f output/sitemap.xml || (echo "Missing sitemap.xml" && exit 1)
          test -f output/robots.txt || (echo "Missing robots.txt" && exit 1)
          test -f output/CNAME || (echo "Missing CNAME" && exit 1)
          echo "Validation passed"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './output'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
